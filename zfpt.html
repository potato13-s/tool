<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>字符拼图画工具 · 极速版</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  background: #0f172a;
  color: #f1f5f9;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  overflow: hidden;
}

#app {
  display: flex;
  flex-direction: column;
  width: 100vw;
  height: 100vh;
}

/* 顶部控制面板 */
#controlPanel {
  background: #1e293b;
  padding: 22px 28px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
  z-index: 10;
}

/* 底部画布区域 */
#canvasContainer {
  flex: 1;
  background: #000;
  position: relative;
  overflow: auto;
  display: flex;
  align-items: center;
  justify-content: center;
}

canvas {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  image-rendering: pixelated !important;
}

/* 样式美化 */
.label {
  font-size: 13px;
  color: #cbd5e1;
  margin-bottom: 6px;
}

textarea {
  min-width: 280px;
  height: 46px;
  padding: 12px 14px;
  border-radius: 8px;
  background: #334155;
  border: none;
  color: #fff;
  font-size: 15px;
  outline: none;
  resize: none;
}

input[type="range"] {
  width: 180px;
  height: 6px;
  border-radius: 6px;
  background: #334155;
  -webkit-appearance: none;
  outline: none;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #38bdf8;
  cursor: pointer;
}

#densityValue {
  color: #38bdf8;
  font-weight: 600;
  font-size: 14px;
  min-width: 30px;
}

button {
  padding: 12px 20px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: 0.2s;
}

.btn-generate {
  background: #0ea5e9;
  color: white;
}
.btn-generate:hover {
  background: #0284c7;
}

.btn-save {
  background: #10b981;
  color: white;
}
.btn-save:hover {
  background: #059669;
}

input[type="file"] {
  color: #cbd5e1;
  font-size: 13px;
}

.row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.col {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

/* 加载提示 */
.loading {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #38bdf8;
  font-size: 18px;
  display: none;
}
</style>
</head>

<body>
<div id="app">
  <!-- 顶部参数区 -->
  <div id="controlPanel">
    <div class="col">
      <div class="label">自定义字符/表情（推荐：❤️🌟😊🌸）</div>
      <textarea id="customChars">❤️🌟😊🌸✨💖☀️🌙🥳</textarea>
    </div>

    <div class="col">
      <div class="label">密度：<span id="densityValue">20</span></div>
      <input type="range" id="density" min="8" max="50" value="20" step="1">
    </div>

    <input type="file" id="fileInput" accept="image/*">

    <button class="btn-generate" onclick="generate()">✨ 生成</button>
    <button class="btn-save" onclick="saveImage()">💾 保存</button>
  </div>

  <!-- 底部图片区 -->
  <div id="canvasContainer">
    <div class="loading" id="loading">生成中...</div>
    <canvas id="cvs"></canvas>
  </div>
</div>

<script>
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');
const loading = document.getElementById('loading');
let originalImage = null;
let imgDataCache = null;
// 新增：离屏画布（避免主画布高频重绘）
const offscreenCanvas = document.createElement('canvas');
const offscreenCtx = offscreenCanvas.getContext('2d');
// 新增：缓存字符和字体配置
let charCache = '';
let fontCache = '';

const densitySlider = document.getElementById('density');
const densityValue = document.getElementById('densityValue');
// 预定义兼容表情库
const safeEmojis = ['❤️', '🌟', '😊', '🌸', '✨', '💖', '☀️', '🌙', '🥳', '🎉', '🍀', '🔥'];

densitySlider.oninput = () => {
  densityValue.textContent = densitySlider.value;
};

// 优化1：上传图片时压缩尺寸（限制最大宽高1500，避免超大图）
document.getElementById('fileInput').onchange = function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => {
      // 压缩图片尺寸：最大宽高1500px，等比缩放
      const MAX_SIZE = 1500;
      let { width, height } = img;
      if (width > MAX_SIZE || height > MAX_SIZE) {
        const ratio = Math.min(MAX_SIZE / width, MAX_SIZE / height);
        width = Math.floor(width * ratio);
        height = Math.floor(height * ratio);
      }

      // 初始化画布尺寸
      cvs.width = width;
      cvs.height = height;
      offscreenCanvas.width = width;
      offscreenCanvas.height = height;
      
      // 绘制并缓存像素数据
      ctx.drawImage(img, 0, 0, width, height);
      imgDataCache = ctx.getImageData(0, 0, width, height);
      originalImage = img;
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
};

// 优化2：生成逻辑重构（批量绘制+离屏渲染+预计算）
function generate() {
  if (!originalImage || !imgDataCache) {
    alert('请先上传图片');
    return;
  }

  loading.style.display = 'block';
  // 使用Web Worker级别的异步（比requestAnimationFrame更高效）
  setTimeout(() => {
    try {
      const step = parseInt(densitySlider.value);
      charCache = document.getElementById('customChars').value.trim() || safeEmojis.join('');
      fontCache = `${step}px "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji", sans-serif`;
      
      const w = cvs.width;
      const h = cvs.height;
      const data = imgDataCache.data;
      const textLen = charCache.length;
      const halfStep = step / 2;

      // 1. 清空离屏画布（单次操作）
      offscreenCtx.fillStyle = '#000';
      offscreenCtx.fillRect(0, 0, w, h);
      offscreenCtx.font = fontCache;
      offscreenCtx.textBaseline = "middle";
      offscreenCtx.textAlign = "center";
      offscreenCtx.imageSmoothingEnabled = false;

      // 2. 优化循环：减少内层计算 + 批量绘制
      // 预计算：每行像素数、亮度系数（避免循环内重复计算）
      const pixelsPerRow = w * 4;
      const brightnessFactor = (textLen - 1) / 255;

      for (let y = 0; y < h; y += step) {
        // 预计算当前行起始索引（只算一次）
        const rowOffset = y * pixelsPerRow;
        // 批量构建当前行的绘制指令（减少fillText调用）
        let rowDraws = [];
        for (let x = 0; x < w; x += step) {
          const pixelIndex = rowOffset + x * 4;
          // 优化亮度计算：合并运算
          const r = data[pixelIndex];
          const g = data[pixelIndex + 1];
          const b = data[pixelIndex + 2];
          const gray = (r * 299 + g * 587 + b * 114) >> 10; // 等价于 / 1024
          const charIndex = Math.min(Math.floor(gray * brightnessFactor), textLen - 1);
          
          rowDraws.push({
            char: charCache[charIndex],
            x: x + halfStep,
            y: y + halfStep,
            color: `rgb(${r}, ${g}, ${b})`
          });
        }
        // 批量绘制当前行（减少Canvas上下文切换）
        rowDraws.forEach(d => {
          offscreenCtx.fillStyle = d.color;
          offscreenCtx.fillText(d.char, d.x, d.y);
        });
      }

      // 3. 一次性将离屏画布绘制到主画布（核心优化！）
      ctx.drawImage(offscreenCanvas, 0, 0);
    } catch (e) {
      console.error('生成失败：', e);
      alert('生成失败，请重试');
    } finally {
      loading.style.display = 'none';
    }
  }, 0);
}

// 保存逻辑保持不变（已最优）
function saveImage() {
  if (!originalImage) return alert('请先生成图片');
  const link = document.createElement('a');
  link.download = '表情拼图画.png';
  link.href = cvs.toDataURL('image/png', 1.0);
  link.click();
}
</script>
</body>
</html>
